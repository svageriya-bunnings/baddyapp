<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1b5e20" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Badminton Session Manager</title>

  <!-- PWA Web App Manifest (inline data-URI — no extra file needed) -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Badminton%20Session%20Manager%22%2C%22short_name%22%3A%22Badminton%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231b5e20%22%2C%22theme_color%22%3A%22%231b5e20%22%2C%22description%22%3A%22Offline%20badminton%20session%20and%20fixture%20manager%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fpng%3Bbase64%2CiVBORw0KGgoAAAANSUhEUgAAAIAAAACACAMAAAD04JH5AAAAA1BMVEUbXiD%2F9HMsAAAAI0lEQVR42mNkYGBg%2BGcAAAGAAJ%2FPZmcAAAAASUVORK5CYII%3D%22%2C%22sizes%22%3A%22128x128%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D" />

  <style>
    /* ─── Design Tokens ─────────────────────────────────────────── */
    :root {
      /* Brand palette */
      --clr-primary:        #1b5e20;   /* dark green */
      --clr-primary-mid:    #2e7d32;
      --clr-primary-light:  #43a047;
      --clr-primary-xlight: #c8e6c9;
      --clr-accent:         #f9a825;   /* amber highlight */
      --clr-accent-dark:    #f57f17;
      --clr-danger:         #c62828;
      --clr-danger-light:   #ffcdd2;
      --clr-win:            #2e7d32;
      --clr-lose:           #757575;

      /* Neutrals */
      --clr-bg:             #f1f8e9;
      --clr-surface:        #ffffff;
      --clr-surface-2:      #f9fbe7;
      --clr-border:         #dcedc8;
      --clr-text:           #1c2b1e;
      --clr-text-muted:     #5a6e5c;
      --clr-text-on-dark:   #ffffff;

      /* Level colours */
      --clr-beginner:       #1565c0;
      --clr-intermediate:   #e65100;
      --clr-advanced:       #6a1b9a;

      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      --font-mono: "SF Mono", "Fira Code", "Consolas", monospace;

      --text-xs:   0.70rem;
      --text-sm:   0.85rem;
      --text-base: 1rem;
      --text-lg:   1.15rem;
      --text-xl:   1.4rem;
      --text-2xl:  1.75rem;

      --fw-normal: 400;
      --fw-medium: 500;
      --fw-bold:   700;

      /* Spacing */
      --sp-1:  0.25rem;
      --sp-2:  0.5rem;
      --sp-3:  0.75rem;
      --sp-4:  1rem;
      --sp-5:  1.25rem;
      --sp-6:  1.5rem;
      --sp-8:  2rem;
      --sp-10: 2.5rem;
      --sp-12: 3rem;

      /* Radii */
      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  16px;
      --radius-xl:  24px;
      --radius-full: 9999px;

      /* Shadows */
      --shadow-sm:  0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.08);
      --shadow-md:  0 4px 12px rgba(0,0,0,.12), 0 2px 6px rgba(0,0,0,.08);
      --shadow-lg:  0 8px 24px rgba(0,0,0,.14), 0 4px 8px rgba(0,0,0,.08);

      /* Layout */
      --nav-height:     58px;
      --max-content:    680px;
      --transition:     0.22s ease;
    }

    /* ─── CSS Reset ─────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      color: var(--clr-text);
      background: var(--clr-bg);
      line-height: 1.55;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    img, svg { display: block; max-width: 100%; }

    button {
      font-family: inherit;
      font-size: inherit;
      cursor: pointer;
      border: none;
      outline: none;
      background: none;
    }
    button:focus-visible {
      outline: 3px solid var(--clr-primary-light);
      outline-offset: 2px;
    }

    input, select, textarea {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: 2px solid var(--clr-primary-light);
      outline-offset: 1px;
    }

    a { color: var(--clr-primary-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    ul, ol { list-style: none; }

    h1, h2, h3, h4 {
      line-height: 1.25;
      font-weight: var(--fw-bold);
    }

    /* ─── Utility Classes ───────────────────────────────────────── */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    .flex        { display: flex; }
    .flex-col    { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center  { justify-content: center; }
    .gap-2       { gap: var(--sp-2); }
    .gap-3       { gap: var(--sp-3); }
    .gap-4       { gap: var(--sp-4); }
    .w-full      { width: 100%; }
    .text-center { text-align: center; }
    .text-sm     { font-size: var(--text-sm); }
    .text-xs     { font-size: var(--text-xs); }
    .font-bold   { font-weight: var(--fw-bold); }
    .font-medium { font-weight: var(--fw-medium); }
    .text-muted  { color: var(--clr-text-muted); }

    /* ─── Component: App Shell ──────────────────────────────────── */
    #app-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: var(--clr-primary);
      color: var(--clr-text-on-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--sp-4);
      z-index: 100;
      box-shadow: var(--shadow-md);
      gap: var(--sp-3);
    }

    #nav-brand {
      font-size: var(--text-lg);
      font-weight: var(--fw-bold);
      letter-spacing: .02em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #nav-brand span { color: var(--clr-accent); }

    #nav-meta {
      font-size: var(--text-xs);
      color: rgba(255,255,255,.75);
      text-align: center;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #nav-actions {
      display: flex;
      gap: var(--sp-1);
      flex-shrink: 0;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: var(--sp-1) var(--sp-2);
      border-radius: var(--radius-sm);
      color: rgba(255,255,255,.7);
      font-size: var(--text-xs);
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
    }
    .nav-btn svg { width: 18px; height: 18px; }
    .nav-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
    .nav-btn.active {
      background: rgba(255,255,255,.18);
      color: var(--clr-accent);
    }

    /* ─── Component: View Container ────────────────────────────── */
    #view-root {
      margin-top: var(--nav-height);
      min-height: calc(100dvh - var(--nav-height));
      padding: var(--sp-6) var(--sp-4) var(--sp-12);
    }

    .view-inner {
      max-width: var(--max-content);
      margin: 0 auto;
    }

    /* ─── View Transitions ──────────────────────────────────────── */
    .view-enter {
      animation: viewFadeIn var(--transition) both;
    }

    @keyframes viewFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Component: Card ───────────────────────────────────────── */
    .card {
      background: var(--clr-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--clr-border);
      padding: var(--sp-5);
    }

    .card + .card { margin-top: var(--sp-4); }

    .card-title {
      font-size: var(--text-lg);
      font-weight: var(--fw-bold);
      color: var(--clr-primary);
      margin-bottom: var(--sp-4);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    /* ─── Component: Button ─────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-5);
      border-radius: var(--radius-md);
      font-weight: var(--fw-medium);
      font-size: var(--text-sm);
      transition: background var(--transition), transform var(--transition),
                  box-shadow var(--transition), opacity var(--transition);
      white-space: nowrap;
      user-select: none;
      touch-action: manipulation;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-primary {
      background: var(--clr-primary-light);
      color: #fff;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary:hover { background: var(--clr-primary); box-shadow: var(--shadow-md); }

    .btn-secondary {
      background: var(--clr-surface);
      color: var(--clr-primary);
      border: 1.5px solid var(--clr-primary-light);
    }
    .btn-secondary:hover { background: var(--clr-primary-xlight); }

    .btn-danger {
      background: var(--clr-danger);
      color: #fff;
    }
    .btn-danger:hover { background: #b71c1c; }

    .btn-ghost {
      color: var(--clr-text-muted);
      padding: var(--sp-2) var(--sp-3);
    }
    .btn-ghost:hover { color: var(--clr-text); background: rgba(0,0,0,.05); }

    .btn-icon {
      padding: var(--sp-2);
      border-radius: var(--radius-sm);
      color: var(--clr-text-muted);
    }
    .btn-icon:hover { background: rgba(0,0,0,.07); color: var(--clr-text); }
    .btn-icon svg { width: 17px; height: 17px; }

    .btn-full { width: 100%; }
    .btn-sm {
      padding: var(--sp-2) var(--sp-3);
      font-size: var(--text-xs);
    }

    /* ─── Component: Form Controls ──────────────────────────────── */
    .form-group { display: flex; flex-direction: column; gap: var(--sp-1); }
    .form-label {
      font-size: var(--text-sm);
      font-weight: var(--fw-medium);
      color: var(--clr-text-muted);
    }

    .form-input {
      padding: var(--sp-3) var(--sp-4);
      border: 1.5px solid var(--clr-border);
      border-radius: var(--radius-md);
      background: var(--clr-surface);
      transition: border-color var(--transition);
      width: 100%;
    }
    .form-input:focus { border-color: var(--clr-primary-light); }
    .form-input.error { border-color: var(--clr-danger); }

    .form-error {
      font-size: var(--text-xs);
      color: var(--clr-danger);
      min-height: 1em;
    }

    /* ─── Component: Level Badge ─────────────────────────────────  */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px var(--sp-2);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--fw-bold);
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .badge-beginner     { background: #e3f2fd; color: var(--clr-beginner); }
    .badge-intermediate { background: #fff3e0; color: var(--clr-intermediate); }
    .badge-advanced     { background: #f3e5f5; color: var(--clr-advanced); }

    /* ─── Component: Toast / Inline Notice ──────────────────────── */
    .notice {
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }
    .notice-info    { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #43a047; }
    .notice-warning { background: #fff8e1; color: #f57f17; border-left: 4px solid #ffa000; }
    .notice-error   { background: var(--clr-danger-light); color: var(--clr-danger); border-left: 4px solid var(--clr-danger); }

    /* ─── Component: Divider ─────────────────────────────────────  */
    .divider {
      border: none;
      border-top: 1px solid var(--clr-border);
      margin: var(--sp-5) 0;
    }

    /* ─── Empty / Loading placeholder ───────────────────────────── */
    .empty-state {
      text-align: center;
      padding: var(--sp-10) var(--sp-4);
      color: var(--clr-text-muted);
    }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: var(--sp-3); }
    .empty-state-text { font-size: var(--text-sm); }

    /* ─── Session-Picker Modal ───────────────────────────────────  */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-4);
      animation: viewFadeIn .2s both;
    }
    .modal {
      background: var(--clr-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      padding: var(--sp-6);
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }
    .modal-title {
      font-size: var(--text-xl);
      font-weight: var(--fw-bold);
      color: var(--clr-primary);
    }
    .modal-subtitle {
      font-size: var(--text-sm);
      color: var(--clr-text-muted);
      margin-top: calc(var(--sp-1) * -1);
    }
    .session-date-list {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }
    .session-date-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) var(--sp-4);
      background: var(--clr-bg);
      border: 1.5px solid var(--clr-border);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: var(--fw-medium);
      cursor: pointer;
      font-family: inherit;
      color: var(--clr-text);
      transition: background var(--transition), border-color var(--transition);
      text-align: left;
    }
    .session-date-btn:hover {
      background: var(--clr-primary-xlight);
      border-color: var(--clr-primary-light);
    }
    .session-date-meta {
      font-size: var(--text-xs);
      color: var(--clr-text-muted);
    }

    /* ─── Responsive Breakpoints ─────────────────────────────────  */
    @media (min-width: 540px) {
      #view-root { padding: var(--sp-8) var(--sp-6) var(--sp-12); }
    }
    @media (min-width: 768px) {
      #nav-brand { font-size: var(--text-xl); }
      #nav-meta  { font-size: var(--text-sm); }
      .nav-btn   { font-size: var(--text-sm); }
      .nav-btn svg { width: 20px; height: 20px; }
    }

    /* ─── Setup View ─────────────────────────────────────────────── */
    .setup-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-4);
    }
    @media (max-width: 380px) {
      .setup-meta-grid { grid-template-columns: 1fr; }
    }

    /* Level segmented control (hidden radio inputs + styled labels) */
    .level-seg {
      display: flex;
      gap: var(--sp-1);
    }
    .level-seg-item {
      flex: 1;
    }
    .level-seg-item input[type="radio"] {
      position: absolute;
      width: 0; height: 0;
      opacity: 0;
      pointer-events: none;
    }
    .level-seg-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-2) var(--sp-2);
      border-radius: var(--radius-md);
      border: 1.5px solid var(--clr-border);
      font-size: var(--text-sm);
      font-weight: var(--fw-medium);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition),
                  color var(--transition);
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      white-space: nowrap;
    }
    .level-seg-label:hover {
      background: var(--clr-surface-2);
      border-color: var(--clr-text-muted);
    }
    .level-seg-item input:checked + .level-seg-label.level-seg-beginner {
      background: #e3f2fd; border-color: var(--clr-beginner); color: var(--clr-beginner);
    }
    .level-seg-item input:checked + .level-seg-label.level-seg-intermediate {
      background: #fff3e0; border-color: var(--clr-intermediate); color: var(--clr-intermediate);
    }
    .level-seg-item input:checked + .level-seg-label.level-seg-advanced {
      background: #f3e5f5; border-color: var(--clr-advanced); color: var(--clr-advanced);
    }
    .level-seg.level-seg-sm .level-seg-label {
      padding: var(--sp-1) var(--sp-2);
      font-size: var(--text-xs);
    }

    /* Card header row: title left, action right */
    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-4);
    }
    .card-title-row .card-title { margin-bottom: 0; }

    /* Player count pill inside card title */
    .player-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.5rem;
      height: 1.5rem;
      padding: 0 var(--sp-2);
      background: var(--clr-primary-light);
      color: #fff;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--fw-bold);
      margin-left: var(--sp-2);
      vertical-align: middle;
    }

    /* Player list */
    .player-list {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      margin-top: var(--sp-3);
    }
    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3);
      background: var(--clr-bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--clr-border);
      gap: var(--sp-2);
      transition: background var(--transition);
    }
    .player-row:hover { background: var(--clr-primary-xlight); }
    .player-row-editing {
      background: var(--clr-surface-2) !important;
      border-color: var(--clr-primary-light) !important;
      flex-direction: column;
      align-items: stretch;
    }
    .player-info {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      flex: 1;
      min-width: 0;
    }
    .player-name {
      font-weight: var(--fw-medium);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .player-actions {
      display: flex;
      gap: var(--sp-1);
      flex-shrink: 0;
    }
    .edit-form {
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }
    .edit-btns {
      display: flex;
      gap: var(--sp-2);
    }

    /* Setup footer: reset left, generate right */
    .setup-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      margin-top: var(--sp-6);
      flex-wrap: wrap;
    }
    .generate-meta {
      font-size: var(--text-xs);
      opacity: .8;
      margin-left: var(--sp-1);
    }

    /* ─── Stats View ───────────────────────────────────────────────  */
    .stats-section-title {
      font-size: var(--text-lg);
      font-weight: var(--fw-bold);
      color: var(--clr-primary);
      margin-bottom: var(--sp-4);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    /* Sort buttons */
    .sort-bar {
      display: flex;
      gap: var(--sp-1);
      flex-wrap: wrap;
      margin-bottom: var(--sp-3);
    }
    .sort-btn {
      padding: var(--sp-1) var(--sp-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--fw-medium);
      border: 1.5px solid var(--clr-border);
      background: var(--clr-surface);
      color: var(--clr-text-muted);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }
    .sort-btn:hover { background: var(--clr-primary-xlight); border-color: var(--clr-primary-light); color: var(--clr-primary); }
    .sort-btn.active { background: var(--clr-primary); border-color: var(--clr-primary); color: #fff; }

    /* Leaderboard table */
    .lb-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--text-sm);
    }
    .lb-table th {
      text-align: left;
      padding: var(--sp-2) var(--sp-3);
      font-size: var(--text-xs);
      font-weight: var(--fw-bold);
      color: var(--clr-text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 2px solid var(--clr-border);
      white-space: nowrap;
    }
    .lb-table td {
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 1px solid var(--clr-border);
      vertical-align: middle;
    }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr:hover td { background: var(--clr-bg); }
    .lb-row-gold   td:first-child::before { content: '🥇 '; }
    .lb-row-silver td:first-child::before { content: '🥈 '; }
    .lb-row-bronze td:first-child::before { content: '🥉 '; }
    .lb-row-gold   td { background: #fffde7; }
    .lb-row-silver td { background: #f5f5f5; }

    .winpct-bar {
      display: inline-block;
      width: 40px;
      height: 6px;
      border-radius: 3px;
      background: var(--clr-border);
      vertical-align: middle;

    }

      position: absolute;
      top: 0; left: 0; height: 100%;

    /* Partnership list */
    .partnership-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3);
      background: var(--clr-bg);
      border-radius: var(--radius-md);
      border: 1px solid var(--clr-border);
      margin-bottom: var(--sp-2);
    }
    .partnership-rank {
      font-weight: var(--fw-bold);
      color: var(--clr-text-muted);
      font-size: var(--text-sm);
      min-width: 1.5rem;
      text-align: center;
    }
    .partnership-names {
      flex: 1;
      font-weight: var(--fw-medium);
      font-size: var(--text-sm);
    }
    .partnership-wins {
      font-size: var(--text-xs);
      font-weight: var(--fw-bold);

      white-space: nowrap;
    }

    /* Variety meter */
    .variety-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-3);
      border-radius: var(--radius-md);
      border: 1px solid var(--clr-border);
      margin-bottom: var(--sp-2);
      background: var(--clr-surface);
    }
    .variety-row.variety-low {
      border-color: #ffa000;
      background: #fff8e1;
    }
    .variety-name {
      font-weight: var(--fw-medium);
      font-size: var(--text-sm);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;

    }
    .variety-meter {
      width: 64px;
      height: 6px;

    .variety-fill.variety-fill-low { background: #ffa000; }
    .variety-score-text {

    /* Round history accordion */
    .accordion-item {
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: var(--sp-2);
    }
    .accordion-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) var(--sp-4);
      background: var(--clr-surface-2);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: var(--text-sm);

      color: var(--clr-text);
      text-align: left;

    .accordion-body {
      padding: var(--sp-3) var(--sp-4);
      background: var(--clr-surface);
      display: none;

    .history-fixture-row {

      align-items: flex-start;

      font-weight: var(--fw-bold);

      gap: var(--sp-3);

    /* ─── Round View ─────────────────────────────────────────────── */
    .round-header {

      align-items: center;
      gap: var(--sp-3);
      margin-bottom: var(--sp-5);

      font-size: var(--text-xl);
      font-weight: var(--fw-bold);

      border-radius: var(--radius-lg);
      border: 1.5px solid var(--clr-border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      margin-bottom: var(--sp-4);
      transition: box-shadow var(--transition);
    }
    .fixture-court-label {
      background: var(--clr-primary);
      color: var(--clr-text-on-dark);
      font-size: var(--text-xs);
      font-weight: var(--fw-bold);
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: var(--sp-2) var(--sp-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .match-quality-tag {
      font-size: var(--text-xs);
      font-weight: var(--fw-medium);
      letter-spacing: .03em;
      text-transform: none;
      padding: 2px var(--sp-2);
      border-radius: var(--radius-full);
      background: rgba(255,255,255,.18);
    }
    .match-quality-tag.mq-well    { background: rgba(255,255,255,.22); color: #e8f5e9; }
    .match-quality-tag.mq-close   { background: rgba(255,255,255,.18); color: #fff9c4; }
    .match-quality-tag.mq-slight  { background: rgba(255,193,7,.25);   color: #fff8e1; }
    .match-quality-tag.mq-uneven  { background: rgba(244,67,54,.25);   color: #ffcdd2; }

    .fixture-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
      gap: 0;
    }
    .fixture-team {
      padding: var(--sp-4);
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      transition: background var(--transition), opacity var(--transition);
    }
    .fixture-team-label {
      font-size: var(--text-xs);
      font-weight: var(--fw-bold);
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--clr-text-muted);
    }
    .fixture-player {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      flex-wrap: wrap;
    }
    .fixture-player-name {
      font-weight: var(--fw-medium);
      font-size: var(--text-sm);
    }
    .fixture-vs {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--clr-bg);
      padding: var(--sp-2);
      font-weight: var(--fw-bold);
      color: var(--clr-text-muted);
      font-size: var(--text-sm);
      min-width: 36px;
    }

    /* Winner / Loser states */
    .fixture-team.team-winner {
      background: #e8f5e9;
    }
    .fixture-team.team-loser {
      background: var(--clr-bg);
      opacity: .55;
    }
    .fixture-team.team-winner .fixture-team-label {
